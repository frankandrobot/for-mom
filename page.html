<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For Mom</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page message-page shipwreck-page">
    <audio id="theme-song" src="assets/little-mermaid-theme.mp3" loop preload="auto"></audio>

    <main class="ocean-scene" aria-labelledby="message-title">
      <div class="abyss-depth" aria-hidden="true"></div>
      <div class="deep-caustics" aria-hidden="true"></div>
      <div class="light-rays" aria-hidden="true"></div>
      <div class="reef reef-left" aria-hidden="true"></div>
      <div class="reef reef-right" aria-hidden="true"></div>
      <div class="shipwreck-art" aria-hidden="true">
        <svg viewBox="0 0 680 360" role="img">
          <defs>
            <linearGradient id="wreckWood" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0" stop-color="#8b5a44" />
              <stop offset="0.58" stop-color="#5b342d" />
              <stop offset="1" stop-color="#2f1f25" />
            </linearGradient>
            <linearGradient id="sailGlow" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0" stop-color="#fff6dc" stop-opacity="0.86" />
              <stop offset="1" stop-color="#b39ddb" stop-opacity="0.46" />
            </linearGradient>
          </defs>
          <path class="wreck-shadow" d="M65 296c96 35 407 38 535 6 28-7 22 28-13 37-140 37-417 25-523-5-30-9-32-50 1-38Z" />
          <g class="wreck-body">
            <path d="M102 230c63 29 183 42 319 29 63-6 120-24 155-50-8 47-42 85-101 105-84 29-262 24-348-15-26-12-38-37-25-69Z" fill="url(#wreckWood)" />
            <path d="M97 224c87 35 263 45 395 13 34-8 63-20 86-35l12 31c-67 43-233 64-366 47-66-9-119-23-145-44l18-12Z" fill="#9f6a4c" />
            <path d="M153 248c0 0 38 20 102 27m42 5c64 4 142-2 198-24" fill="none" stroke="#2c1c23" stroke-width="10" stroke-linecap="round" opacity="0.38" />
            <path d="M181 199l42 77M291 209l26 81M431 199l-18 86M521 172l-43 100" stroke="#2f1f25" stroke-width="13" stroke-linecap="round" />
            <circle cx="203" cy="243" r="16" fill="#112f3e" stroke="#ffd166" stroke-width="6" />
            <circle cx="322" cy="254" r="14" fill="#112f3e" stroke="#ffd166" stroke-width="5" />
            <circle cx="444" cy="240" r="15" fill="#112f3e" stroke="#ffd166" stroke-width="5" />
          </g>
          <g class="wreck-mast">
            <path d="M349 68l-21 219" stroke="#4b2a2a" stroke-width="18" stroke-linecap="round" />
            <path d="M238 121c75-17 148-14 227 10" stroke="#4b2a2a" stroke-width="14" stroke-linecap="round" />
            <path d="M350 83c-41 37-61 76-60 132 33-18 76-20 122-6-23-48-38-85-62-126Z" fill="url(#sailGlow)" stroke="#fff6dc" stroke-width="4" opacity="0.78" />
            <path d="M292 216c38-19 77-20 119-8" fill="none" stroke="#b39ddb" stroke-width="5" opacity="0.55" />
            <path d="M286 156l76 15M304 122l44 47M381 124l-30 46" stroke="#6d4660" stroke-width="5" stroke-linecap="round" opacity="0.45" />
          </g>
          <g class="wreck-coral">
            <path d="M112 299c-9-25 2-45 17-61 4 22 2 42-17 61Z" fill="#8df0dc" />
            <path d="M548 292c18-24 17-49 6-70-10 23-14 44-6 70Z" fill="#ff6f61" />
            <path d="M582 295c-2-30 13-48 35-61 0 27-9 47-35 61Z" fill="#ffb6b9" />
          </g>
        </svg>
      </div>
      <div class="bubbles" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>

      <section class="message-panel">
        <p class="eyebrow">20m Deep</p>
        <h1 id="message-title">Why Mom Is the Best Mom Ever</h1>
        <form class="mom-list" aria-label="Reasons Mom is the best">
          <label>
            <span></span>
            <input type="text" placeholder="She makes me feel safe around her!" />
          </label>
          <label>
            <span></span>
            <input type="text" placeholder="My favorite thing about her is that she always cares about me!" />
          </label>
          <label>
            <span></span>
            <input type="text" placeholder="She is the best because she loves me and is my mom!" />
          </label>
          <label>
            <span></span>
            <input type="text" placeholder="I love when she cooks brocolli soup!" />
          </label>
          <label>
            <span></span>
            <input type="text" placeholder="She taught me how to cook!" />
          </label>
          <label>
            <span></span>
            <input type="text" placeholder="She makes the best food EVER!" />
          </label>
          <label>
            <span></span>
            <input type="text" placeholder="I am thankful for she being my mom!" />
          </label>
        </form>
        <a class="back-link" href="index.html">Back to start</a>
      </section>

      <section class="music-controls" aria-label="Music controls">
        <button class="control-button" type="button" data-toggle-audio>Play Music</button>
        <label class="volume-control">
          <span>Volume</span>
          <input type="range" min="0" max="1" step="0.05" value="0.7" data-volume-control />
        </label>
        <p class="audio-note" data-audio-status>Use Play Music to start the song.</p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
